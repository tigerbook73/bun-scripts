pre-commit:
  commands:
    no-commit-to-main:
      priority: 1
      run: |
        branch=$(git symbolic-ref --short HEAD 2>/dev/null)
        if [ "$branch" = "main" ]; then
          echo "Error: direct commits to main branch are not allowed."
          exit 1
        fi
    lint:
      priority: 2
      glob: "**/*.ts"
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true
    format:
      priority: 2
      glob: "**/*.{ts,js,json,md,yaml,yml}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    typecheck:
      priority: 3
      run: pnpm typecheck
    test:
      priority: 3
      run: pnpm test
